{# Single reusable "caixinha" template for one philosopher. #}
<div class="phil-card" id="card-{{ p.key }}" role="dialog" aria-hidden="true" aria-labelledby="card-{{ p.key }}-name">
  <button class="phil-card-close" aria-label="Fechar" onclick="closeAllPhilCards()">&times;</button>
  <div class="phil-card-content">
    <div class="phil-card-image-container">
      <img src="{{ url_for('static', filename='images/philosophers/' ~ p.key ~ '.png') }}" 
           alt="Foto de {{ p.full_name }}" 
           class="phil-card-img" 
           style="display: none;"
           onload="this.style.display='block'; this.nextElementSibling.style.display='none';"
           onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />
      <div class="phil-card-placeholder" style="display: flex; background-color: {{ p.color }}18; border-color: {{ p.color }}55;">
        <span class="phil-card-placeholder-initial" style="color: {{ p.color }};">{{ p.name[0] }}</span>
      </div>
    </div>
    <div class="phil-card-body">
      <div class="phil-card-name" id="card-{{ p.key }}-name">{{ p.full_name }}</div>
      <div class="phil-card-criterion" style="color: {{ p.color }};">{{ p.criterion | safe }}</div>
      <p class="phil-card-bio">{{ p.bio | safe }}</p>
      {% if p.reference %}
      <p class="phil-card-reference">{{ p.reference | safe }}</p>
      {% endif %}
      <div class="phil-card-actions">
        <a href="/philosopher/{{ p.key }}" class="phil-card-expand-btn" style="background-color: {{ p.color }};">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;">
            <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/>
          </svg>
          Expandir
        </a>
      </div>
    </div>
  </div>
</div>
