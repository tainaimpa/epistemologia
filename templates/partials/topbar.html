<div id="top-bar">
  <div style="display:flex; align-items:center; gap:6px;">
    <button id="menu-toggle" aria-label="Alternar barra lateral" style="background:none; border:none; color:var(--text-main); cursor:pointer; padding:6px; display:flex; align-items:center; justify-content:center; margin-right:4px; outline:none;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
    </button>
    <span class="bar-label">Pensadores:</span>
    <div id="phil-buttons" class="phil-buttons">
      {% for p in philosophers %}
      <div class="phil-btn" data-key="{{ p.key }}" data-color="{{ p.color }}">
        <input type="checkbox" class="phil-checkbox" id="chk-{{ p.key }}"
               {% if p.default_active %}checked{% endif %} aria-label="Selecionar {{ p.name }}" />
        <span class="pname">{{ p.name }}</span>
        <button type="button" class="phil-info-btn" data-key="{{ p.key }}"
                aria-haspopup="dialog" aria-expanded="false" aria-controls="card-{{ p.key }}"
                aria-label="Sobre {{ p.name }}">
          <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor"
               stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="16" x2="12" y2="12"/>
            <line x1="12" y1="8" x2="12.01" y2="8"/>
          </svg>
        </button>
      </div>
      {% endfor %}
    </div>
  </div>
  <div style="display:flex; align-items:center; gap:6px;">
    <a href="/sobre" id="about-link" aria-label="Sobre nós" style="display:flex; align-items:center; gap:6px; padding:8px 12px; border:1px solid var(--border-color); border-radius:999px; color:var(--text-main); text-decoration:none; font-size:13px; font-weight:500; transition:background 0.2s, border-color 0.2s;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="16" x2="12" y2="12"/>
        <line x1="12" y1="8" x2="12.01" y2="8"/>
      </svg>
      <span>Sobre nós</span>
    </a>
    <button id="theme-toggle" aria-label="Alternar tema">
    <svg id="theme-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="5" class="sun-element"/>
      <line x1="12" y1="1" x2="12" y2="3" class="sun-element"/>
      <line x1="12" y1="21" x2="12" y2="23" class="sun-element"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" class="sun-element"/>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" class="sun-element"/>
      <line x1="1" y1="12" x2="3" y2="12" class="sun-element"/>
      <line x1="21" y1="12" x2="23" y2="12" class="sun-element"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" class="sun-element"/>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" class="sun-element"/>
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" class="moon-element"/>
    </svg>
  </button>
  </div>
</div>

{% for p in philosophers %}
  {% include "partials/phil_card.html" %}
{% endfor %}
